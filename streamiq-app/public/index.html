<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StreamIQ — CS3200 Project 2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f17;--surface:#141720;--surface2:#1c2030;--border:#252840;
  --accent:#6c63ff;--accent2:#a78bfa;--green:#34d399;--red:#f87171;
  --yellow:#fbbf24;--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{width:28px;height:28px}
.logo h1{font-size:1.25rem;font-weight:700;color:var(--accent2)}
header span{font-size:0.78rem;color:var(--muted);background:var(--surface2);
  padding:3px 10px;border-radius:20px;border:1px solid var(--border)}

nav{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;gap:4px}
.tab{padding:12px 20px;background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:0.9rem;border-bottom:2px solid transparent;
  transition:all .2s;letter-spacing:.01em}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--muted2)}

main{max-width:1200px;margin:0 auto;padding:28px}
.page{display:none}.page.active{display:block}

.toolbar{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;flex-wrap:wrap;gap:12px}
.toolbar h2{font-size:.8rem;color:var(--muted2);font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.toolbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input[type=text],input[type=email],input[type=number],select{
  background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:8px 12px;font-size:.875rem;outline:none;
  transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
.search-input{width:220px}

.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;
  font-size:.85rem;font-weight:500;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.88}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:#7f1d1d;color:var(--red);border:1px solid #991b1b}
.btn-warning{background:#78350f;color:var(--yellow);border:1px solid #92400e}
.btn-success{background:#064e3b;color:var(--green);border:1px solid #065f46}
.btn-ghost{background:var(--surface2);color:var(--muted2);border:1px solid var(--border)}
.btn-sm{padding:4px 10px;font-size:.78rem}

.table-wrap{background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--surface2)}
th{padding:11px 16px;text-align:left;font-size:.75rem;
  color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  border-bottom:1px solid var(--border)}
td{padding:11px 16px;font-size:.855rem;color:var(--muted2);
  border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02);color:var(--text)}
td strong{color:var(--text)}
.actions{display:flex;gap:6px;flex-wrap:wrap}

.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-green{background:#052e16;color:var(--green);border:1px solid #065f46}
.badge-red{background:#450a0a;color:var(--red);border:1px solid #7f1d1d}
.badge-purple{background:#2e1065;color:var(--accent2);border:1px solid #4c1d95}
.badge-yellow{background:#451a03;color:var(--yellow);border:1px solid #78350f}
.badge-blue{background:#0c1a40;color:#93c5fd;border:1px solid #1e3a6e}
.badge-gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1rem;color:var(--text);margin-bottom:20px;font-weight:600}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:14px}
.fg label{display:block;margin-bottom:5px;font-size:.78rem;color:var(--muted);font-weight:500}
.fg input,.fg select,.fg textarea{width:100%}
.fg textarea{background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);padding:8px 12px;font-size:.875rem;
  outline:none;resize:vertical;min-height:70px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;
  padding-top:16px;border-top:1px solid var(--border)}

.detail-panel{background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:20px;margin-top:20px}
.detail-panel h3{font-size:.9rem;color:var(--muted2);margin-bottom:14px;
  font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.album-card{background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:14px;margin-bottom:10px}
.album-card h4{color:var(--text);font-size:.9rem;margin-bottom:4px}
.album-meta{font-size:.78rem;color:var(--muted);margin-bottom:10px}
.song-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.song-item{display:flex;align-items:center;gap:8px;padding:6px 8px;
  background:var(--surface);border-radius:6px;font-size:.82rem;color:var(--muted2)}
.song-item .track-num{color:var(--muted);width:20px;text-align:right;flex-shrink:0}
.song-item .song-title{flex:1;color:var(--text)}
.song-item .song-dur{color:var(--muted);font-size:.75rem}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:18px 20px}
.stat-card .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:6px}
.stat-card .value{font-size:1.6rem;font-weight:700;color:var(--text)}
.stat-card .sub{font-size:.78rem;color:var(--muted);margin-top:3px}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;
  border-radius:8px;color:#fff;font-size:.875rem;z-index:999;
  display:none;max-width:340px;line-height:1.4}
.toast.show{display:block;animation:fadeUp .3s ease}
.toast.success{background:#064e3b;border:1px solid #065f46}
.toast.error{background:#450a0a;border:1px solid #7f1d1d}
@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.9rem}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent)">
      <circle cx="12" cy="12" r="10"/><path d="M9 9l6 3-6 3V9z"/>
    </svg>
    <h1>StreamIQ</h1>
  </div>
  <span>CS3200 Project 2 — MongoDB + Node + Express</span>
</header>

<nav>
  <button class="tab active" onclick="goTab('users',this)">Users</button>
  <button class="tab" onclick="goTab('artists',this)">Artists</button>
  <button class="tab" onclick="goTab('history',this)">Listen History</button>
</nav>

<main>

<!-- USERS PAGE -->
<div id="page-users" class="page active">
  <div class="toolbar">
    <h2>Users</h2>
    <div class="toolbar-right">
      <input type="text" class="search-input" id="user-search" placeholder="Search username..." oninput="filterUsers()"/>
      <button class="btn btn-primary" onclick="openUserModal()">+ Add User</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Username</th><th>Email</th><th>Tier</th>
        <th>Playlists</th><th>Following</th><th>Date Joined</th><th>Actions</th>
      </tr></thead>
      <tbody id="users-tbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- ARTISTS PAGE -->
<div id="page-artists" class="page">
  <div class="toolbar">
    <h2>Artists</h2>
    <div class="toolbar-right">
      <input type="text" class="search-input" id="artist-search" placeholder="Search name or genre..." oninput="filterArtists()"/>
      <button class="btn btn-primary" onclick="openArtistModal()">+ Add Artist</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Name</th><th>Country</th><th>Genre</th><th>Albums</th><th>Actions</th>
      </tr></thead>
      <tbody id="artists-tbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
  <div id="artist-detail" style="display:none"></div>
</div>

<!-- HISTORY PAGE -->
<div id="page-history" class="page">
  <div class="stats-grid" id="history-stats"></div>
  <div class="toolbar">
    <h2>Listen Events</h2>
    <div class="toolbar-right">
      <input type="text" class="search-input" id="history-user-filter"
        placeholder="Filter by username..." oninput="loadHistory()"/>
      <button class="btn btn-primary" onclick="openHistoryModal()">+ Log Play</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Timestamp</th><th>Username</th><th>Song</th>
        <th>Artist</th><th>Album</th><th>Duration</th><th>Actions</th>
      </tr></thead>
      <tbody id="history-tbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

</main>

<!-- USER MODAL -->
<div class="overlay" id="user-modal">
  <div class="modal">
    <h3 id="user-modal-title">Add User</h3>
    <input type="hidden" id="u-id"/>
    <div class="form-row">
      <div class="fg"><label>Username *</label><input type="text" id="u-username" placeholder="melodyfan99"/></div>
      <div class="fg"><label>Email *</label><input type="email" id="u-email" placeholder="user@email.com"/></div>
    </div>
    <div class="fg">
      <label>Subscription Tier</label>
      <select id="u-tier">
        <option value="Free">Free</option>
        <option value="Premium">Premium</option>
        <option value="Family">Family</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('user-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<!-- ARTIST MODAL -->
<div class="overlay" id="artist-modal">
  <div class="modal">
    <h3 id="artist-modal-title">Add Artist</h3>
    <input type="hidden" id="a-id"/>
    <div class="form-row">
      <div class="fg"><label>Name *</label><input type="text" id="a-name" placeholder="Aurora Wave"/></div>
      <div class="fg"><label>Country</label><input type="text" id="a-country" placeholder="Sweden"/></div>
    </div>
    <div class="fg">
      <label>Primary Genre</label>
      <select id="a-genre">
        <option>Indie Pop</option><option>Electronic</option><option>House</option>
        <option>Hip-Hop</option><option>K-Pop</option><option>Pop</option>
        <option>Rock</option><option>R&B</option><option>Jazz</option><option>Classical</option>
      </select>
    </div>
    <div class="fg"><label>Bio</label><textarea id="a-bio" placeholder="Short artist biography..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('artist-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveArtist()">Save</button>
    </div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="overlay" id="history-modal">
  <div class="modal">
    <h3>Log Listen Event</h3>
    <div class="form-row">
      <div class="fg"><label>Username *</label><input type="text" id="h-username" placeholder="melodyfan99"/></div>
      <div class="fg"><label>Song Title *</label><input type="text" id="h-title" placeholder="Midnight Rain"/></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Artist Name</label><input type="text" id="h-artist" placeholder="Aurora Wave"/></div>
      <div class="fg"><label>Album Title</label><input type="text" id="h-album" placeholder="Dreamscape"/></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Song ID</label><input type="number" id="h-songid" placeholder="1001"/></div>
      <div class="fg"><label>Play Duration (sec)</label><input type="number" id="h-duration" placeholder="234"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('history-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveHistory()">Log Play</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allUsers = [], allArtists = [], allHistory = [];

const $ = id => document.getElementById(id);
function toast(msg, type = 'success') {
  const t = $('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3200);
}
function openModal(id)  { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }
function fmtDur(s) {
  if (!s && s !== 0) return '-';
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function tierBadge(t) {
  const map = {Premium:'badge-purple',Family:'badge-yellow',Free:'badge-gray'};
  return `<span class="badge ${map[t]||'badge-gray'}">${t||'Free'}</span>`;
}
function genreBadge(g) {
  const map = {Electronic:'badge-blue','Indie Pop':'badge-purple','K-Pop':'badge-red',
    'Hip-Hop':'badge-yellow',House:'badge-green'};
  return `<span class="badge ${map[g]||'badge-gray'}">${g||'?'}</span>`;
}

function goTab(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  $(`page-${name}`).classList.add('active');
  el.classList.add('active');
  if (name === 'users')   loadUsers();
  if (name === 'artists') loadArtists();
  if (name === 'history') { loadHistory(); loadHistoryStats(); }
}

// ═══ USERS ═══
async function loadUsers() {
  try {
    const res = await fetch('/api/users');
    allUsers = await res.json();
    renderUsers(allUsers);
  } catch { $('users-tbody').innerHTML = '<tr><td colspan="7" class="empty">Error loading users.</td></tr>'; }
}

function renderUsers(users) {
  const tb = $('users-tbody');
  if (!users.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">No users found.</td></tr>'; return; }
  tb.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td style="color:var(--muted)">${u.email}</td>
      <td>${tierBadge(u.subscriptionTier)}</td>
      <td>${u.playlists?.length ?? 0}</td>
      <td>${u.followedArtists?.length ?? 0}</td>
      <td>${u.dateJoined || '-'}</td>
      <td><div class="actions">
        <button class="btn btn-warning btn-sm" onclick="editUser('${u._id}')">Edit</button>
        <button class="btn btn-success btn-sm" onclick="toggleTier('${u._id}')">Toggle Tier</button>
        <button class="btn btn-danger btn-sm" onclick="deleteUser('${u._id}')">Delete</button>
      </div></td>
    </tr>`).join('');
}

function filterUsers() {
  const q = $('user-search').value.toLowerCase();
  renderUsers(allUsers.filter(u =>
    u.username.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
  ));
}

function openUserModal(user = null) {
  $('u-id').value       = user?._id || '';
  $('u-username').value = user?.username || '';
  $('u-email').value    = user?.email || '';
  $('u-tier').value     = user?.subscriptionTier || 'Free';
  $('user-modal-title').textContent = user ? 'Edit User' : 'Add User';
  openModal('user-modal');
}

async function editUser(id) {
  const u = allUsers.find(x => x._id === id);
  if (u) openUserModal(u);
}

async function saveUser() {
  const id   = $('u-id').value;
  const body = {
    username: $('u-username').value.trim(),
    email:    $('u-email').value.trim(),
    subscriptionTier: $('u-tier').value
  };
  if (!body.username || !body.email) { toast('Username and email are required', 'error'); return; }
  try {
    const r = await fetch(id ? `/api/users/${id}` : '/api/users', {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    closeModal('user-modal');
    toast(id ? `${body.username} updated!` : `${body.username} created!`);
    loadUsers();
  } catch { toast('Request failed', 'error'); }
}

async function toggleTier(id) {
  try {
    const r = await fetch(`/api/users/${id}/toggle-tier`, { method: 'PATCH' });
    const u = await r.json();
    toast(`${u.username} → ${u.subscriptionTier}`);
    loadUsers();
  } catch { toast('Failed to toggle tier', 'error'); }
}

async function deleteUser(id) {
  const u = allUsers.find(x => x._id === id);
  if (!confirm(`Delete user "${u?.username}"?`)) return;
  try {
    const r = await fetch(`/api/users/${id}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    toast('User deleted');
    loadUsers();
  } catch { toast('Delete failed', 'error'); }
}

// ═══ ARTISTS ═══
async function loadArtists() {
  try {
    const res = await fetch('/api/artists');
    allArtists = await res.json();
    renderArtists(allArtists);
  } catch { $('artists-tbody').innerHTML = '<tr><td colspan="5" class="empty">Error loading artists.</td></tr>'; }
}

function renderArtists(artists) {
  const tb = $('artists-tbody');
  if (!artists.length) { tb.innerHTML = '<tr><td colspan="5" class="empty">No artists found.</td></tr>'; return; }
  tb.innerHTML = artists.map(a => `
    <tr>
      <td><strong>${a.name}</strong></td>
      <td>${a.country || '-'}</td>
      <td>${genreBadge(a.primaryGenre)}</td>
      <td>${a.albums?.length ?? 0} album${(a.albums?.length ?? 0) !== 1 ? 's' : ''}</td>
      <td><div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="viewArtist('${a._id}')">View</button>
        <button class="btn btn-warning btn-sm" onclick="editArtist('${a._id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteArtist('${a._id}')">Delete</button>
      </div></td>
    </tr>`).join('');
}

function filterArtists() {
  const q = $('artist-search').value.toLowerCase();
  renderArtists(allArtists.filter(a =>
    a.name.toLowerCase().includes(q) ||
    (a.primaryGenre||'').toLowerCase().includes(q) ||
    (a.country||'').toLowerCase().includes(q)
  ));
}

function viewArtist(id) {
  const a = allArtists.find(x => x._id === id);
  if (!a) return;
  const panel = $('artist-detail');
  panel.style.display = 'block';

  const albumsHtml = (a.albums || []).map(alb => {
    const songs = (alb.songs || []).map(s => `
      <li class="song-item">
        <span class="track-num">${s.trackNumber}</span>
        <span class="song-title">${s.title}${s.isExplicit ? ' <span class="badge badge-red" style="font-size:.65rem">E</span>' : ''}</span>
        <span class="song-dur">${fmtDur(s.duration)}</span>
      </li>`).join('');
    return `
      <div class="album-card">
        <h4>${alb.title} <span class="badge badge-gray" style="font-size:.68rem">${alb.albumType}</span></h4>
        <div class="album-meta">Released ${alb.releaseDate} · ${alb.songs?.length ?? 0} tracks</div>
        <ul class="song-list">${songs}</ul>
        <div style="margin-top:10px">
          <button class="btn btn-warning btn-sm" onclick="toggleExplicit('${id}','${alb.title}')">
            Toggle Explicit Flags
          </button>
        </div>
      </div>`;
  }).join('') || '<p style="color:var(--muted);font-size:.85rem">No albums yet.</p>';

  panel.innerHTML = `
    <div class="detail-panel">
      <h3>${a.name} — Albums & Songs</h3>
      ${albumsHtml}
    </div>`;
}

function openArtistModal(artist = null) {
  $('a-id').value      = artist?._id || '';
  $('a-name').value    = artist?.name || '';
  $('a-country').value = artist?.country || '';
  $('a-genre').value   = artist?.primaryGenre || 'Indie Pop';
  $('a-bio').value     = artist?.bio || '';
  $('artist-modal-title').textContent = artist ? 'Edit Artist' : 'Add Artist';
  openModal('artist-modal');
}

async function editArtist(id) {
  const a = allArtists.find(x => x._id === id);
  if (a) openArtistModal(a);
}

async function saveArtist() {
  const id   = $('a-id').value;
  const body = {
    name:         $('a-name').value.trim(),
    country:      $('a-country').value.trim(),
    primaryGenre: $('a-genre').value,
    bio:          $('a-bio').value.trim()
  };
  if (!body.name) { toast('Name is required', 'error'); return; }
  try {
    const r = await fetch(id ? `/api/artists/${id}` : '/api/artists', {
      method: id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    closeModal('artist-modal');
    toast(id ? `${body.name} updated!` : `${body.name} added!`);
    loadArtists();
  } catch { toast('Request failed', 'error'); }
}

async function toggleExplicit(id, albumTitle) {
  try {
    const r = await fetch(`/api/artists/${id}/toggle-explicit`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ albumTitle })
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    toast(`Explicit flags toggled for "${albumTitle}"`);
    await loadArtists();
    viewArtist(id);
  } catch { toast('Toggle failed', 'error'); }
}

async function deleteArtist(id) {
  const a = allArtists.find(x => x._id === id);
  if (!confirm(`Delete artist "${a?.name}"? This cannot be undone.`)) return;
  try {
    const r = await fetch(`/api/artists/${id}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    toast('Artist deleted');
    $('artist-detail').style.display = 'none';
    loadArtists();
  } catch { toast('Delete failed', 'error'); }
}

// ═══ LISTEN HISTORY ═══
async function loadHistory() {
  const username = $('history-user-filter').value.trim();
  const url = username ? `/api/history?username=${encodeURIComponent(username)}&limit=50` : '/api/history?limit=50';
  try {
    const res = await fetch(url);
    allHistory = await res.json();
    renderHistory(allHistory);
  } catch { $('history-tbody').innerHTML = '<tr><td colspan="7" class="empty">Error loading history.</td></tr>'; }
}

function renderHistory(history) {
  const tb = $('history-tbody');
  if (!history.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">No listen events found.</td></tr>'; return; }
  tb.innerHTML = history.map(h => `
    <tr>
      <td style="font-size:.78rem;color:var(--muted)">${fmtDate(h.timestamp)}</td>
      <td><strong>${h.username}</strong></td>
      <td>${h.song?.title || '-'}</td>
      <td>${h.song?.artistName || '-'}</td>
      <td style="color:var(--muted)">${h.song?.albumTitle || '-'}</td>
      <td>${fmtDur(h.playDuration)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteHistory('${h._id}')">Delete</button></td>
    </tr>`).join('');
}

async function loadHistoryStats() {
  const users = ['melodyfan99','newlistener42','basshead_mike'];
  const results = await Promise.all(
    users.map(u => fetch(`/api/history/count/${u}`).then(r=>r.json()).catch(()=>null))
  );
  const grid = $('history-stats');
  grid.innerHTML = results.filter(Boolean).map(r => `
    <div class="stat-card">
      <div class="label">${r.username}</div>
      <div class="value">${r.total}</div>
      <div class="sub">total plays logged</div>
    </div>`).join('');
}

function openHistoryModal() {
  ['h-username','h-title','h-artist','h-album','h-songid','h-duration']
    .forEach(id => $(id).value = '');
  openModal('history-modal');
}

async function saveHistory() {
  const body = {
    username:   $('h-username').value.trim(),
    title:      $('h-title').value.trim(),
    artistName: $('h-artist').value.trim(),
    albumTitle: $('h-album').value.trim(),
    songID:     $('h-songid').value,
    playDuration: $('h-duration').value
  };
  if (!body.username || !body.title) { toast('Username and song title are required', 'error'); return; }
  try {
    const r = await fetch('/api/history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    closeModal('history-modal');
    toast(`Play logged: "${body.title}"`);
    loadHistory();
    loadHistoryStats();
  } catch { toast('Request failed', 'error'); }
}

async function deleteHistory(id) {
  if (!confirm('Delete this listen event?')) return;
  try {
    const r = await fetch(`/api/history/${id}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    toast('Event deleted');
    loadHistory();
  } catch { toast('Delete failed', 'error'); }
}

// Init
loadUsers();
</script>
</body>
